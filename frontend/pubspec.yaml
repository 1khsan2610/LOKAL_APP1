name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Secure Storage & Auth
  flutter_secure_storage: ^9.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.1.0

  # Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^16.1.0

  # Image & Media
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # Charts & Data Visualization
  fl_chart: ^0.63.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_serializable: ^6.7.1
  shimmer: ^3.0.0
  permission_handler: ^11.3.1
  uuid: ^4.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true